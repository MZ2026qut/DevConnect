name: DevConnect CI Build Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build React Application
        run: |
          cd frontend
          npm run build

      - name: Deployment Note
        run: echo "Code builds successfully! Automated SSH deployment is restricted by university IAM policies."
